<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Chat Cleaner — RIZABELLA Studio</title>
<style>
  :root{
    --bg:#0e1613;
    --panel:#16211c;
    --panel2:#1c2a23;
    --border:#2a3d33;
    --ink:#e8f0eb;
    --muted:#8fa89b;
    --accent:#35c46a;
    --accent-dark:#1f8a49;
    --chip:#233830;
    --danger:#e07a5f;
    --mono:'Consolas','Menlo',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:20px;
  }
  .wrap{max-width:1100px;margin:0 auto}
  header{
    display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
    border-bottom:2px solid var(--accent-dark);
    padding-bottom:14px;margin-bottom:18px;
  }
  header h1{font-size:1.35rem;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  header .sub{color:var(--muted);font-size:.85rem}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}

  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    display:flex;flex-direction:column;gap:10px;
  }
  .panel h2{font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}

  textarea{
    width:100%;min-height:280px;
    background:var(--panel2);
    color:var(--ink);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px;
    font-family:var(--mono);
    font-size:.82rem;
    line-height:1.5;
    resize:vertical;
  }
  textarea:focus{outline:2px solid var(--accent-dark);outline-offset:1px}
  #output{background:#101a15}

  .controls{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:16px;
    display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;
  }
  .toggle{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    font-size:.88rem;user-select:none;
  }
  .toggle input{display:none}
  .toggle .pill{
    width:38px;height:20px;border-radius:20px;
    background:var(--chip);border:1px solid var(--border);
    position:relative;transition:background .15s;
    flex-shrink:0;
  }
  .toggle .pill::after{
    content:'';position:absolute;top:2px;left:2px;
    width:14px;height:14px;border-radius:50%;
    background:var(--muted);transition:all .15s;
  }
  .toggle input:checked + .pill{background:var(--accent-dark)}
  .toggle input:checked + .pill::after{left:20px;background:#fff}

  select{
    background:var(--panel2);color:var(--ink);
    border:1px solid var(--border);border-radius:6px;
    padding:6px 10px;font-size:.85rem;
  }
  label.sel{display:flex;align-items:center;gap:8px;font-size:.88rem}

  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
  button{
    background:var(--accent-dark);color:#fff;
    border:none;border-radius:7px;
    padding:9px 16px;font-size:.88rem;font-weight:600;
    cursor:pointer;letter-spacing:.3px;
  }
  button:hover{background:var(--accent)}
  button.ghost{background:var(--chip);color:var(--ink);border:1px solid var(--border)}
  button.ghost:hover{background:var(--panel2)}

  .stats{
    display:flex;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);
  }
  .stats b{color:var(--accent)}
  .stat-chip{background:var(--chip);border-radius:20px;padding:4px 12px}

  .hint{font-size:.75rem;color:var(--muted);line-height:1.5}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--accent-dark);color:#fff;
    padding:10px 22px;border-radius:30px;font-size:.85rem;font-weight:600;
    transition:transform .25s;box-shadow:0 4px 20px rgba(0,0,0,.4);
    pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>WhatsApp <span>Chat Cleaner</span></h1>
    <div class="sub">RIZABELLA Studio · paste karo, saaf chats lo</div>
  </header>

  <div class="controls">
    <label class="toggle"><input type="checkbox" id="tgSender" checked><span class="pill"></span>Sender Name</label>
    <label class="toggle"><input type="checkbox" id="tgDate"><span class="pill"></span>Date</label>
    <label class="toggle"><input type="checkbox" id="tgTime"><span class="pill"></span>Time</label>
    <label class="toggle"><input type="checkbox" id="tgSystem" checked><span class="pill"></span>System / Media msgs hatao</label>
    <label class="toggle"><input type="checkbox" id="tgTaskId" checked><span class="pill"></span>Task IDs (T705...) hatao</label>
    <label class="toggle"><input type="checkbox" id="tgBlank"><span class="pill"></span>Msgs ke beech blank line</label>
    <label class="sel">Sender filter:
      <select id="senderFilter"><option value="__ALL__">Sab log</option></select>
    </label>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Input — WhatsApp chat paste karo</h2>
      <textarea id="input" placeholder="[06/07, 09:50] Shalini Ma'am: please connect over MDO meeting...&#10;[06/07, 09:51] Hiren: Okay ma'am&#10;&#10;(iPhone aur Android dono export formats chalenge)" spellcheck="false"></textarea>
      <div class="hint">Multi-line messages, @mentions ke invisible characters, aur "&lt;Media omitted&gt;" sab automatically handle honge.</div>
    </div>

    <div class="panel">
      <h2>Output — Cleaned chats</h2>
      <textarea id="output" readonly placeholder="Cleaned chats yaha aayengi..."></textarea>
      <div class="stats" id="stats"></div>
      <div class="btnrow">
        <button id="btnCopy">📋 Copy Output</button>
        <button id="btnDownload" class="ghost">⬇ Download .txt</button>
        <button id="btnClear" class="ghost">✕ Clear</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const input = $('input'), output = $('output');
  const tgSender=$('tgSender'), tgDate=$('tgDate'), tgTime=$('tgTime'),
        tgSystem=$('tgSystem'), tgBlank=$('tgBlank'), tgTaskId=$('tgTaskId'),
        senderFilter=$('senderFilter'), stats=$('stats');

  let messages = []; // {date, time, sender, text}
  let plainMode = false; // true jab input WhatsApp format nahi hai (task list / plain text)

  // Invisible/bidi chars WhatsApp inserts around @mentions
  const INVIS = /[\u200e\u200f\u202a-\u202e\u2066-\u2069\ufeff]/g;

  // Task ID lines: "T705", "731", "T727 ❗❗" etc. (poori line sirf ID ho)
  const RE_TASKID_LINE = /^\s*T?\d{2,5}\s*[❗‼️!⚠️]*\s*$/u;
  // Inline prefix: "T705 Get the checklist..." → prefix hatao
  const RE_TASKID_PREFIX = /^\s*T\d{2,5}\s*[❗‼️!⚠️]*\s+/u;

  function stripTaskIds(text){
    return text.split('\n')
      .filter(l => !RE_TASKID_LINE.test(l))
      .map(l => l.replace(RE_TASKID_PREFIX, ''))
      .join('\n');
  }

  // System message patterns (no sender or auto-generated)
  const SYSTEM_PATTERNS = [
    /messages and calls are end-to-end encrypted/i,
    /^<media omitted>$/i,
    /^image omitted$/i, /^video omitted$/i, /^audio omitted$/i,
    /^sticker omitted$/i, /^document omitted$/i, /^gif omitted$/i,
    /^this message was deleted\.?$/i,
    /^you deleted this message\.?$/i,
    /created group/i, /added you/i, /joined using this group/i,
    /left$/i, /changed the subject/i, /changed this group's icon/i,
    /^missed voice call/i, /^missed video call/i
  ];

  // Header regexes:
  // iPhone: [06/07, 09:50] Sender: msg   or   [06/07/26, 9:50:12 am] Sender: msg
  const RE_IOS = /^\[(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?),?\s+(\d{1,2}:\d{2}(?::\d{2})?(?:\s?[apAP]\.?[mM]\.?)?)\]\s(.*)$/;
  // Android: 06/07/26, 9:50 am - Sender: msg
  const RE_AND = /^(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?),?\s+(\d{1,2}:\d{2}(?::\d{2})?(?:\s?[apAP]\.?[mM]\.?)?)\s[-–]\s(.*)$/;

  function parse(raw){
    const lines = raw.replace(INVIS,'').split(/\r?\n/);
    const msgs = [];
    let cur = null;

    for(const line of lines){
      let m = line.match(RE_IOS) || line.match(RE_AND);
      if(m){
        if(cur) msgs.push(cur);
        const rest = m[3];
        const ci = rest.indexOf(': ');
        let sender, text;
        if(ci > -1){
          sender = rest.slice(0, ci).trim();
          text = rest.slice(ci + 2);
        } else {
          sender = '';           // system line (no "Sender: ")
          text = rest;
        }
        cur = {date:m[1], time:m[2], sender, text};
      } else if(cur){
        cur.text += '\n' + line; // continuation of multi-line message
      }
      // lines before first header are ignored
    }
    if(cur) msgs.push(cur);

    // trim trailing whitespace of each message
    msgs.forEach(x => x.text = x.text.replace(/\s+$/,''));
    return msgs;
  }

  function isSystem(m){
    if(!m.sender) return true;
    return SYSTEM_PATTERNS.some(p => p.test(m.text.trim()));
  }

  function refreshSenderList(){
    const prev = senderFilter.value;
    const senders = [...new Set(messages.filter(m=>m.sender).map(m=>m.sender))];
    senderFilter.innerHTML = '<option value="__ALL__">Sab log</option>' +
      senders.map(s=>`<option value="${s.replace(/"/g,'&quot;')}">${s}</option>`).join('');
    if([...senderFilter.options].some(o=>o.value===prev)) senderFilter.value = prev;
  }

  function render(){
    // ---- PLAIN MODE: task list / non-WhatsApp text ----
    if(plainMode){
      const rawLines = input.value.replace(INVIS,'').split(/\r?\n/);
      let removed = 0;
      let lines = rawLines;
      if(tgTaskId.checked){
        lines = rawLines.filter(l => {
          if(RE_TASKID_LINE.test(l)){ removed++; return false; }
          return true;
        }).map(l => l.replace(RE_TASKID_PREFIX, ''));
      }
      let out = lines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
      if(tgBlank.checked) out = out.split('\n').filter(l=>l.trim()).join('\n\n');
      output.value = out;
      const items = out.split('\n').filter(l=>l.trim()).length;
      stats.innerHTML = out
        ? `<span class="stat-chip">Mode: <b>Plain text</b></span>
           <span class="stat-chip"><b>${items}</b> lines</span>
           <span class="stat-chip"><b>${removed}</b> task IDs hataye</span>`
        : '';
      return;
    }

    // ---- WHATSAPP MODE ----
    let list = messages;
    if(tgSystem.checked) list = list.filter(m => !isSystem(m));
    const f = senderFilter.value;
    if(f !== '__ALL__') list = list.filter(m => m.sender === f);

    const showS = tgSender.checked, showD = tgDate.checked, showT = tgTime.checked;
    const out = list.map(m=>{
      let text = tgTaskId.checked ? stripTaskIds(m.text) : m.text;
      let prefix = '';
      const dt = [showD?m.date:null, showT?m.time:null].filter(Boolean).join(', ');
      if(dt) prefix += '[' + dt + '] ';
      if(showS && m.sender) prefix += m.sender + ': ';
      return {full: prefix + text, text};
    }).filter(m => m.text.trim() !== '')   // ID-only messages hatao
      .map(m => m.full)
      .join(tgBlank.checked ? '\n\n' : '\n');

    output.value = out;

    const senders = new Set(list.filter(m=>m.sender).map(m=>m.sender));
    stats.innerHTML = list.length
      ? `<span class="stat-chip">Mode: <b>WhatsApp</b></span>
         <span class="stat-chip"><b>${list.length}</b> messages</span>
         <span class="stat-chip"><b>${senders.size}</b> senders</span>
         <span class="stat-chip"><b>${out.length}</b> chars</span>`
      : '';
  }

  function process(){
    messages = parse(input.value);
    plainMode = messages.length === 0 && input.value.trim() !== '';
    refreshSenderList();
    render();
  }

  input.addEventListener('input', process);
  [tgSender,tgDate,tgTime,tgSystem,tgBlank,tgTaskId].forEach(t=>t.addEventListener('change', render));
  senderFilter.addEventListener('change', render);

  $('btnCopy').addEventListener('click', ()=>{
    if(!output.value) return toast('Pehle chat paste karo!');
    navigator.clipboard.writeText(output.value)
      .then(()=>toast('Copied!'))
      .catch(()=>{ output.select(); document.execCommand('copy'); toast('Copied!'); });
  });

  $('btnDownload').addEventListener('click', ()=>{
    if(!output.value) return toast('Output khaali hai');
    const blob = new Blob([output.value], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cleaned_chat.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  $('btnClear').addEventListener('click', ()=>{
    input.value=''; messages=[]; refreshSenderList(); render();
  });

  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1400);
  }
})();
</script>
</body>
</html>
